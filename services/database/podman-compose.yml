version: '3.8'

services:
  mongodb:
    build:
      context: .
      dockerfile: Containerfile
    container_name: project-manager-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=projectmanager123
      - MONGO_INITDB_DATABASE=project_manager
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_logs:/var/log/mongodb
      - ./backups:/backups
    networks:
      - project-manager-network
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Optional: MongoDB Express for web-based administration
  mongo-express:
    image: mongo-express:latest
    container_name: project-manager-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=projectmanager123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:projectmanager123@mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - project-manager-network

volumes:
  mongodb_data:
    driver: local
  mongodb_logs:
    driver: local

networks:
  project-manager-network:
    driver: bridge 